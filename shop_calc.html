<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop Calculation — Kingshot Toolbox</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .shop-wrap { max-width: 1400px; width: 100%; margin: 0 auto; padding: 20px; box-sizing: border-box; }
        .shop-tabs { display: flex; gap: 4px; flex-wrap: wrap; border-bottom: 1px solid var(--border); margin: 18px 0; }
        .shop-tab {
            background: transparent; border: none; color: var(--text-muted);
            padding: 10px 16px; font-size: 14px; font-weight: 600; cursor: pointer;
            border-bottom: 2px solid transparent; transition: all 0.2s;
        }
        .shop-tab:hover { color: var(--text-light); }
        .shop-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
        .shop-panel { display: none; }
        .shop-panel.active { display: block; }
        .shop-card-grid.chest-grid { grid-template-columns: repeat(auto-fill, minmax(170px, 1fr)); }
        .shop-toolbar { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 15px; }
        .sc-item-img {
            width: 34px; height: 34px; border-radius: 6px;
            background-size: cover; background-position: center;
            background-repeat: no-repeat; border: 1px solid var(--border);
        }
    </style>
</head>
<body class="has-app-header">

    <div class="main-content">
      <div class="shop-wrap">
        <h1 style="color: var(--accent); margin: 0 0 6px;" data-i18n="scTitle">Shop Calculation</h1>
        <p style="color: var(--text-muted); margin: 0;" data-i18n="scDesc">Comparez le coût des objets en boutique à leur valeur en gemmes.</p>

        <div class="shop-tabs">
            <button class="shop-tab active" data-tab="classic" onclick="scTab('classic')" data-i18n="tabClassic">Shop Classique</button>
            <button class="shop-tab"        data-tab="event"   onclick="scTab('event')"   data-i18n="tabEvent">Shop d'Événement</button>
            <button class="shop-tab"        data-tab="chest"   onclick="scTab('chest')"   data-i18n="tabChest">Coffres</button>
            <button class="shop-tab"        data-tab="data"    onclick="scTab('data')"    data-i18n="tabData">Data Item</button>
        </div>

        <!-- ===== Placeholders (phases suivantes) ===== -->
        <div id="panel-classic" class="shop-panel active"></div>
        <div id="panel-event" class="shop-panel"></div>
        <div id="panel-chest" class="shop-panel"></div>

        <!-- ===== DATA ITEM ===== -->
        <div id="panel-data" class="shop-panel panel" style="padding: 20px;">
            <div class="shop-toolbar">
                <input id="item-search" class="table-input" placeholder="Rechercher…" style="flex: 1; min-width: 180px;">
                <select id="item-cat-filter" class="table-select" style="min-width: 170px;"></select>
                <button class="btn-reset" style="background: transparent; border: 1px solid var(--text-muted); color: var(--text-muted);" onclick="scResetItems()" data-i18n="resetItems">Réinitialiser les valeurs</button>
            </div>
            <div id="item-count" style="color: var(--text-muted); font-size: 13px; margin-bottom: 8px;"></div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th style="width: 46px;"></th>
                            <th data-i18n="colName">Nom</th>
                            <th data-i18n="colCat">Catégorie</th>
                            <th data-i18n="colGem">Valeur (gemmes)</th>
                        </tr>
                    </thead>
                    <tbody id="item-tbody"></tbody>
                </table>
            </div>
        </div>
      </div>
    </div>

    <script src="js/site-config.js"></script>
    <script src="js/storage-keys.js"></script>
    <script src="js/lang.js"></script>
    <script src="js/header.js"></script>
    <script src="js/help.js"></script>
    <script src="js/shop_calc.js"></script>
    <script src="js/backup.js"></script>
</body>
</html>
