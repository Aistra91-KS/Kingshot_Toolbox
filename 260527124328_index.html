<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrueGold Calculator V0.4.1</title>
    <link rel="stylesheet" href="styles.css">
<style>
:root { 

  --color-white: #fff;
  --color-black: #000;
  --color-transparent: transparent;
  --color-current: current;

  --color-primary-100: oklch(94.65% 0.03 251.66);
  --color-primary-200: oklch(74.08% 0.11 252.56);
  --color-primary-300: oklch(59.87% 0.22 257.83);
  --color-primary-400: oklch(49.7% 0.18 257.34);
  --color-primary-500: oklch(29.39% 0.1 255.12);
  --color-primary: oklch(59.87% 0.22 257.83);
  --color-primary-hover: oklch(49.7% 0.18 257.34);
  --color-primary-content: oklch(100% 0 0);
  --color-primary-focus: oklch(22.19% 0 264.48);
  --color-secondary-50: oklch(97.43% 0.01 247.9);
  --color-secondary-100: oklch(93.52% 0.02 245.09);
  --color-secondary-200: oklch(85.47% 0.03 246.84);
  --color-secondary-300: oklch(52.78% 0.09 248.39);
  --color-secondary-400: oklch(35.78% 0.11 253.55);
  --color-secondary-500: oklch(24.45% 0.07 250.47);
  --color-secondary: oklch(35.78% 0.11 253.55);
  --color-secondary-content: oklch(100% 0 0);
  --color-neutral-50: oklch(98.16% 0 247.84);
  --color-neutral-100: oklch(95.45% 0 258.32);
  --color-neutral-200: oklch(88.93% 0.01 252.82);
  --color-neutral-250: oklch(76.68% 0 0);
  --color-neutral-300: oklch(50.64% 0.02 266.59);
  --color-neutral-400: oklch(33.19% 0.01 260.72);
  --color-neutral-500: oklch(22.19% 0 264.48);
  --color-neutral-white: oklch(100% 0 0);
  --color-neutral-black: oklch(0% 0 0);
  --color-extra-disabled: oklch(50.64% 0.02 266.59);
  --color-success-100: oklch(93.88% 0.05 164.5);
  --color-success-200: oklch(87.06% 0.12 153.98);
  --color-success-300: oklch(80.89% 0.17 150.33);
  --color-success-400: oklch(54.33% 0.14 152.38);
  --color-success-500: oklch(41.94% 0.11 153.17);
  --color-success: oklch(54.33% 0.14 152.38);
  --color-error-100: oklch(93.68% 0.03 15.36);
  --color-error-200: oklch(85.14% 0.08 38.94);
  --color-error-300: oklch(58.3% 0.24 28.48);
  --color-error-400: oklch(50.95% 0.21 28.41);
  --color-error-500: oklch(25.73% 0.09 26.61);
  --color-error: oklch(58.3% 0.24 28.48);
  --color-warning-100: oklch(96.45% 0.06 96.14);
  --color-warning-200: oklch(87.69% 0.18 93.13);
  --color-warning-300: oklch(79.99% 0.16 76.25);
  --color-warning-400: oklch(55.7% 0.16 45.36);
  --color-warning-500: oklch(41.49% 0.11 45.88);
  --color-warning: oklch(79.99% 0.16 76.25);
  --color-info-100: oklch(95.56% 0.05 203.23);
  --color-info-200: oklch(86.56% 0.13 207.12);
  --color-info-300: oklch(77.36% 0.11 229.07);
  --color-info-400: oklch(52.34% 0.1 225.32);
  --color-info-500: oklch(39.69% 0.07 227);
  --color-info: oklch(77.36% 0.11 229.07);
  --color-accent-05: oklch(72.11% 0.18 39.02); 
}
</style>
</head>
<body>
    <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()">☀️ Light Mode</button>

    <div class="sidebar">
        <h2 data-i18n="ctrlPanel">Control Panel</h2>

        <div class="control-group">
            <h3 data-i18n="config">Configuration</h3>
            <div class="control-row">
                <label data-i18n="lang">Language</label>
                <select id="langue" onchange="triggerUpdate()">
                    <option value="FR">FR</option>
                    <option value="EN">EN</option>
                </select>
            </div>
            <div class="control-row">
                <label data-i18n="baseBonus">Bonus Speed (%)</label>
                <input type="number" id="baseVitesse" value="76.5" step="0.1" oninput="triggerUpdate()" onchange="triggerUpdate()">
            </div>
            <div class="control-row">
                <label data-i18n="groundWorks">Ground Works (+10%)</label>
                <input type="checkbox" id="bonusGround" onchange="triggerUpdate()">
            </div>
            <div class="control-row">
                <label data-i18n="kvkBonus">KVK Bonus (+5%)</label>
                <input type="checkbox" id="bonusKvk" onchange="triggerUpdate()">
            </div>
            <div class="control-row">
                <label data-i18n="greyWolf">Grey Wolf Bonus (%)</label>
                <div style="display:flex; align-items:center; gap:5px;">
                    <input type="checkbox" id="bonusWolfCheck" onchange="triggerUpdate()">
                    <input type="number" id="bonusWolfVal" value="15" step="0.1" style="width:45px;" oninput="triggerUpdate()" onchange="triggerUpdate()">
                </div>
            </div>
            <div class="control-row">
                <label data-i18n="doubleTime">Double Time (+20%)</label>
                <input type="checkbox" id="bonusDouble" onchange="triggerUpdate()">
            </div>
            <div class="total-bonus-row">
                <span data-i18n="totalBonus">Total Bonus</span>
                <span id="totalVitesseDisplay">76.5%</span>
            </div>
        </div>

        <div class="control-group">
            <h3 data-i18n="resources">Resources</h3>
            <div class="control-row">
                <label>TrueGold (TG)</label>
                <input type="number" id="stockTG" value="541" min="0" oninput="triggerUpdate()" onchange="triggerUpdate()">
            </div>
            <div class="control-row">
                <label>Tempered TG (TTG)</label>
                <input type="number" id="stockTTG" value="15" min="0" oninput="triggerUpdate()" onchange="triggerUpdate()">
            </div>
            <div class="control-row">
                <label data-i18n="transfoUsed">Transfos used</label>
                <input type="number" id="transfoUtilisees" value="0" min="0" max="100" oninput="triggerUpdate()" onchange="triggerUpdate()">
            </div>
        </div>

        <div class="control-group">
            <h3 data-i18n="kvkTitle">KVK & Speedups</h3>
            <div class="control-row">
                <label style="color:var(--accent); font-weight:bold;" data-i18n="kvkMode">KVK Mode</label>
                <input type="checkbox" id="modeKVK" onchange="triggerUpdate()">
            </div>
            <div class="control-row">
                <label data-i18n="days">Days</label>
                <input type="number" id="accelJours" value="2" min="0" oninput="triggerUpdate()" onchange="triggerUpdate()">
            </div>
            <div class="control-row">
                <label data-i18n="hours">Hours</label>
                <input type="number" id="accelHeures" value="2" min="0" oninput="triggerUpdate()" onchange="triggerUpdate()">
            </div>
            <div class="control-row">
                <label data-i18n="minutes">Minutes</label>
                <input type="number" id="accelMinutes" value="10" min="0" oninput="triggerUpdate()" onchange="triggerUpdate()">
            </div>
        </div>
    </div>

    <div class="main-content">
        <div class="panel">
            <h2 data-i18n="myBuildings">My Buildings</h2>
            <div class="table-container">
                <table id="buildings-table">
                    <thead>
                        <tr>
                            <th data-i18n="bldgName">Nom Batiment</th>
                            <th data-i18n="curLvl">Level actuel</th>
                            <th data-i18n="targetLvl">Objectif de level</th>
                            <th data-i18n="totalTgTarget">Total TG</th>
                            <th data-i18n="totalTtgTarget">Total TTG</th>
                            <th data-i18n="speedupsTarget">Accélérateurs</th>
                        </tr>
                    </thead>
                    <tbody id="buildings-container"></tbody>
                    <tfoot id="buildings-footer" style="font-weight: bold; background-color: rgba(187, 134, 252, 0.15); border-top: 2px solid var(--accent);">
                        <tr>
                            <td colspan="3" style="text-align: right;" data-i18n="total">Total :</td>
                            <td id="grand-total-tg">0</td>
                            <td id="grand-total-ttg">0</td>
                            <td id="grand-total-time" style="font-size:13px;">0</td>
                        </tr>
                    </tfoot>
                </table>
            </div>
        </div>

        <div class="panel" style="flex: 1; display:flex; flex-direction:column;">
            <h2 data-i18n="strategyOutput">Strategy Output</h2>
            <div id="output" class="result-box" style="flex:1;"></div>
        </div>
    </div>

    <!-- ⚠️ ORDRE IMPORTANT : database.js DOIT être chargé AVANT app.js -->
    <script src="database.js"></script>
    <script src="app.js"></script>
</body>
</html>
