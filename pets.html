<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Familiers — Kingshot Toolbox</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/pets.css">
</head>
<body class="pets-page">

    <!-- Le header fixe est injecté par header.js (comme sur toutes les pages) -->

    <!-- SIDEBAR : navigateur de familiers -->
    <aside class="sidebar pet-sidebar">
        <div class="pet-sb-title" data-i18n="collection">Collection</div>
        <div id="petList" class="pet-list"></div>
    </aside>

    <!-- BLOC PRINCIPAL : scène "champ / chemin" (scroll-jacking) -->
    <main class="pet-main" id="petMain" tabindex="0" aria-label="Familiers">

        <!-- Décor -->
        <div class="field" aria-hidden="true">
            <div class="sky"></div>
            <div class="horizon"></div>
            <div class="ground"><div class="rungs" id="rungs"></div></div>
            <div class="field-vignette"></div>
        </div>

        <!-- Familier actif -->
        <div class="pet-stage">
            <div class="pet-holder" id="petHolder">
                <img class="pet-img" id="petImg" alt="">
                <div class="pet-shadow"></div>
            </div>
        </div>

        <!-- Panneau data (glass, ancré à droite) -->
        <aside class="pet-panel" id="petPanel">
            <div class="glass">
                <span class="pet-badge" id="petBadge"><span class="bdot"></span><span id="petBadgeLabel"></span></span>
                <h1 class="pet-name" id="petName"></h1>
                <div class="pet-level" id="petLevel"></div>

                <div class="pet-sec" data-i18n="attributes">Caractéristiques</div>
                <div class="pet-stats" id="petStats"></div>

                <div class="pet-sec" data-i18n="armyBonus">Bonus d'Armée</div>
                <div class="pet-bonus">
                    <svg viewBox="0 0 24 24"><path d="M12 2 15 8l6 .5-4.5 4 1.4 6L12 15.5 6.1 18.5l1.4-6L3 8.5 9 8z"/></svg>
                    <span id="petBonus"></span>
                </div>

                <div class="pet-sec" data-i18n="skills">Compétences</div>
                <div id="petSkills"></div>
            </div>
        </aside>

        <!-- HUD -->
        <div class="pet-progress" id="progress"></div>
        <div class="pet-counter"><b id="cIdx">1</b> / <span id="cTot">14</span></div>
        <div class="pet-hint">
            <svg viewBox="0 0 24 24"><rect x="8" y="4" width="8" height="16" rx="4"/><path d="M12 8v3"/></svg>
            <span data-i18n="hint">Molette / flèches pour avancer</span>
        </div>
    </main>

    <!-- Socle (ordre identique aux autres pages, sans help/backup : page en lecture seule) -->
    <script src="js/site-config.js"></script>
    <script src="js/lang.js"></script>
    <script src="js/header.js"></script>
    <script src="js/pets.js"></script>
</body>
</html>
