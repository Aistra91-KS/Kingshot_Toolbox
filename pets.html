<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Familiers — Kingshot Toolbox</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/pets.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Karla:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body class="pets-page">

    <!-- Header fixe injecté par header.js -->

    <!-- SIDEBAR : liste des familiers -->
    <aside class="sidebar pet-sidebar">
        <div class="pet-sb-title" data-i18n="collection">Collection</div>
        <div id="petList" class="pet-list"></div>
    </aside>

    <!-- BLOC PRINCIPAL : descente du sentier (scroll-jacking vertical) -->
    <main class="pet-main" id="petMain" tabindex="0" aria-label="Promenade des familiers">

        <!-- Décor (défile en Y). Éléments [data-rate] pilotés par le JS. -->
        <div class="scene" id="scene">
            <div class="field-left"  data-rate="field"></div>
            <div class="field-right" data-rate="field"></div>
            <div class="light"></div>

            <div class="path">
                <div class="path-grain" data-rate="trail"></div>
            </div>
            <div class="grass-l"   data-rate="trail"></div>
            <div class="grass-r"   data-rate="trail"></div>
            <div class="dashed"    data-rate="trail"></div>
            <div class="footsteps" data-rate="trail"></div>

            <!-- Familiers injectés ici (placés "au km" verticalement) -->
            <div class="animals" id="animals"></div>

            <div class="scene-fade"></div>
        </div>

        <!-- Panneau info (carte blanche translucide) -->
        <aside class="pet-info on-right" id="petInfo">
            <div class="card">
                <span class="pet-badge" id="petBadge"><span id="petBadgeLabel"></span></span>
                <h1 class="pet-name" id="petName"></h1>

                <div class="pet-levelbox">
                    <div class="pl-top">
                        <span class="pl-label" data-i18n="yourLevel">Ton niveau</span>
                        <span class="pl-tier" id="petTier"></span>
                    </div>
                    <div class="pl-row">
                        <button type="button" class="pl-step" id="lvlMinus" aria-label="−">−</button>
                        <input type="number" id="petLevelInput" class="pl-input" min="1" step="1" inputmode="numeric">
                        <button type="button" class="pl-step" id="lvlPlus" aria-label="+">+</button>
                        <span class="pl-max" id="petLevelMax"></span>
                    </div>
                    <div class="pl-stars" id="petStars"></div>
                    <div class="pl-adv" id="petAdv" hidden></div>
                </div>

                <div class="pet-sec" data-i18n="skill">Compétence</div>
                <div class="pet-skill-main" id="petSkillMain">
                    <div class="psk-head">
                        <img class="psk-img" id="petSkillImg" alt="">
                        <div class="psk-name" id="petSkillName"></div>
                    </div>
                    <div class="psk-lock" id="petSkillLock" hidden></div>
                    <div class="psk-desc" id="petSkillDesc"></div>
                    <div class="psk-effects" id="petSkillEffects"></div>
                </div>

                <div class="pet-sec" data-i18n="progression">Progression</div>
                <div class="pet-cost" id="petCost"></div>
            </div>
        </aside>

        <!-- HUD -->
        <div class="pet-progress" id="progress"></div>
        <div class="pet-counter"><b id="cIdx">1</b> / <span id="cTot">14</span></div>
        <div class="pet-hint">
            <span data-i18n="hint">Molette pour descendre</span>
            <svg class="chev" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>
        </div>
    </main>

    <!-- Socle -->
    <script src="js/site-config.js"></script>
    <script src="js/storage-keys.js"></script>
    <script src="js/lang.js"></script>
    <script src="js/header.js"></script>
    <script src="js/pets.js"></script>
    <script src="js/backup.js"></script>
</body>
</html>
