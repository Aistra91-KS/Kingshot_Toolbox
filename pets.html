<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Familiers — Kingshot Toolbox</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/pets.css">
</head>
<body class="pets-page">

    <!-- Header fixe injecté par header.js -->

    <!-- SIDEBAR : liste des familiers -->
    <aside class="sidebar pet-sidebar">
        <div class="pet-sb-title" data-i18n="collection">Collection</div>
        <div id="petList" class="pet-list"></div>
    </aside>

    <!-- BLOC PRINCIPAL : promenade nature (scroll-jacking horizontal) -->
    <main class="pet-main" id="petMain" tabindex="0" aria-label="Promenade des familiers">
        <div class="scene" id="scene">
            <div class="sun"></div>
            <div class="cloud c1"></div>
            <div class="cloud c2"></div>

            <div class="layer hills-far" data-rate="hills-far" aria-hidden="true"></div>
            <div class="layer hills-mid" data-rate="hills-mid" aria-hidden="true"></div>
            <div class="layer trees"     data-rate="trees"     aria-hidden="true"></div>

            <div class="ground" aria-hidden="true">
                <div class="ground-tex" data-rate="ground-tex"></div>
            </div>

            <!-- Les familiers sont injectés ici (positionnés "au km") -->
            <div class="animals" id="animals"></div>

            <div class="layer grass-fg" data-rate="grass-fg" aria-hidden="true"></div>
            <div class="scene-vignette" aria-hidden="true"></div>
        </div>

        <!-- Panneau info du familier courant -->
        <aside class="pet-info" id="petInfo">
            <div class="glass">
                <span class="pet-badge" id="petBadge"><span class="bdot"></span><span id="petBadgeLabel"></span></span>
                <h1 class="pet-name" id="petName"></h1>
                <div class="pet-level" id="petLevel"></div>

                <div class="pet-sec" data-i18n="attributes">Caractéristiques</div>
                <div class="pet-stats" id="petStats"></div>

                <div class="pet-sec" data-i18n="armyBonus">Bonus d'Armée</div>
                <div class="pet-bonus">
                    <svg viewBox="0 0 24 24"><path d="M12 2 15 8l6 .5-4.5 4 1.4 6L12 15.5 6.1 18.5l1.4-6L3 8.5 9 8z"/></svg>
                    <span id="petBonus"></span>
                </div>

                <div class="pet-sec" data-i18n="skills">Compétences</div>
                <div id="petSkills"></div>
            </div>
        </aside>

        <!-- HUD -->
        <div class="pet-progress" id="progress"></div>
        <div class="pet-counter"><b id="cIdx">1</b> / <span id="cTot">14</span></div>
        <div class="pet-hint">
            <svg viewBox="0 0 24 24"><rect x="8" y="4" width="8" height="16" rx="4"/><path d="M12 8v3"/></svg>
            <span data-i18n="hint">Molette / flèches pour marcher</span>
        </div>
    </main>

    <!-- Socle -->
    <script src="js/site-config.js"></script>
    <script src="js/lang.js"></script>
    <script src="js/header.js"></script>
    <script src="js/pets.js"></script>
</body>
</html>
