<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conseil des Experts — Kingshot Toolbox</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
      .bt-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 8px; }
      .bt-pill { position: relative; display: flex; flex-direction: column; align-items: center; gap: 2px; padding: 8px 6px; border: 1px solid var(--border); border-radius: 8px; background: var(--control-bg); cursor: pointer; text-align: center; user-select: none; transition: border-color .15s, background .15s; }
      .bt-pill input { position: absolute; opacity: 0; pointer-events: none; }
      .bt-pill:hover { border-color: var(--accent); }
      .bt-pill.on { border-color: var(--success); background: rgba(78,205,196,0.12); box-shadow: 0 0 0 1px var(--success) inset; }
      .bt-pill.unreached { opacity: 0.45; }
      .bt-pill.forced, .bt-pill.unreached { cursor: not-allowed; }
      .bt-lvl { font-size: 13px; font-weight: bold; color: var(--accent); }
      .bt-pill.on .bt-lvl { color: var(--success); }
      .bt-emb { font-size: 10px; color: var(--text-muted); line-height: 1.2; }
      @media (max-width: 640px) { .bt-grid { grid-template-columns: repeat(3, 1fr); } }
    </style>
</head>
<body class="has-app-header">
    
    <div class="sidebar">
        <h2 style="color: var(--accent); margin-top: 0;" data-i18n="pageTitle">Conseil des Experts</h2>
        <p style="color: var(--text-muted); font-size: 13px; line-height: 1.5;" data-i18n="pageDesc">
            Gérez le niveau de relation et les compétences de vos experts.
        </p>

        <div class="control-group" style="margin-top: 20px;">
            <h3 style="margin: 0 0 15px 0; font-size: 14px; color: var(--text-muted); text-transform: uppercase;" data-i18n="filterSort">Tri & Filtres</h3>

            <div class="filter-group" style="margin-bottom: 15px;">
                <label data-i18n="searchMaster" style="display:block; margin-bottom:6px;">Rechercher</label>
                <input type="text" id="master-search" class="table-input" data-i18n-placeholder="searchMasterPh" placeholder="Nom de l'expert…" style="width: 100%;">
            </div>

            <div class="control-row" style="margin-bottom: 10px;">
                <label data-i18n="sortBy">Trier par</label>
                <select id="master-sort" class="table-select" style="width: 100%;">
                    <option value="name" data-i18n="sortName">Nom (A-Z)</option>
                    <option value="rel-desc" data-i18n="sortRelDesc">Relation (Décroissant)</option>
                    <option value="rel-asc" data-i18n="sortRelAsc">Relation (Croissant)</option>
                </select>
            </div>

            <hr style="border: 0; border-top: 1px solid var(--border); margin: 15px 0;">

            <label style="display: flex; align-items: center; gap: 8px; font-size: 13px; cursor: pointer;">
                <input type="checkbox" id="master-hide-locked">
                <span data-i18n="hideLocked">Masquer les experts non débloqués</span>
            </label>
        </div>
    </div>

    <div class="main-content">
        <div id="masters-grid" class="masters-grid">
            </div>
    </div>

    <div id="master-modal">
        <div class="modal-content" style="pointer-events: auto !important; width: 100%; height: 100%; overflow-y: auto; background: var(--bg-panel); border: 1px solid var(--border); border-radius: 12px; box-shadow: -15px 0 40px rgba(0, 0, 0, 0.5); display: flex; flex-direction: column;">
            
            <div id="modal-header-bg" style="height: 150px; background-size: cover; background-position: center 20%; border-bottom: 2px solid var(--accent); position: relative;">
                <div style="position: absolute; bottom: 0; left: 0; right: 0; height: 100%; background: linear-gradient(to top, var(--bg-panel) 0%, transparent 100%);"></div>
                <h2 id="modal-master-name" style="position: absolute; bottom: 10px; left: 20px; margin: 0; color: var(--accent); text-transform: uppercase; letter-spacing: 1px;">Nom</h2>
            </div>

            <div id="modal-body" style="padding: 20px; flex: 1;">
                
                <div data-mtab="relation">
                <!-- RELATION & STATUT -->
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; background: var(--control-bg); padding: 15px; border-radius: 8px; border: 1px solid var(--border);">
                    <div>
                        <div id="modal-master-name-inline" style="font-size: 17px; font-weight: bold; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px;">Nom</div>
                        <span style="font-size: 13px; color: var(--text-muted);" data-i18n="relLevel">Niv. de Relation</span>
                        <div id="modal-master-title" style="font-size: 11px; color: var(--accent); text-transform: uppercase; margin-top: 4px;">Titre</div>
                        <!-- NOUVEAU : Statut de Relation -->
                        <div id="modal-master-status" style="font-size: 14px; font-weight: bold; color: var(--success); margin-top: 6px;">Étranger</div>
                        <div id="modal-affinity-text" style="font-size: 12px; color: var(--text-muted); margin-top: 6px; display: none;"></div>
                    </div>
                    <div style="display: flex; flex-direction: column; gap: 6px; align-items: flex-end;">
                        <div id="modal-affinity-type" style="font-size: 13px; font-weight: bold; color: var(--accent); text-align: right;"></div>
                        <input type="number" id="modal-rel-level" min="0" max="100" oninput="updateMasterUI()" onchange="updateMasterUI()" title="Niveau exact (0-100)" style="width: 72px; background: var(--bg-dark); color: var(--text-light); border: 1px solid var(--border); padding: 5px 8px; border-radius: 4px; text-align: center; font-weight: bold; font-size: 13px;">
                    </div>
                </div>

                </div>

                <div data-mtab="break">
                <!-- PALIERS DE PERCÉE -->
                <div class="skills-section" style="margin-bottom: 15px;">
                    <h4 style="margin: 0 0 6px 0; color: var(--text-muted); text-transform: uppercase; font-size: 13px;" data-i18n="lblBreakthroughs">Paliers de percée</h4>
                    <div style="font-size: 11px; color: var(--text-muted); margin-bottom: 10px;" data-i18n="breakthroughHint">Coche les paliers dont tu as dépensé les emblèmes.</div>
                    <div id="modal-breakthroughs" class="bt-grid"></div>
                </div>

                <!-- AVERTISSEMENT BLOCAGE -->
                <div id="modal-blocked-warning" style="margin-bottom: 15px; padding: 12px 15px; background: rgba(231, 76, 92, 0.12); border-left: 4px solid var(--warning); border-radius: 4px; font-size: 13px; color: var(--text-light); display: none;"></div>

                <!-- NOUVEAU : PROCHAIN OBJECTIF -->
                <div id="modal-next-objective" style="margin-bottom: 25px; padding: 12px 15px; background: rgba(78, 205, 196, 0.1); border-left: 4px solid var(--success); border-radius: 4px; font-size: 13px; color: var(--text-light); display: none;">
                    <!-- Injecté par JS -->
                </div>

                </div>

                <div data-mtab="skills">
                <div class="skills-section" style="margin-bottom: 25px;">
                    <h4 style="margin: 0 0 10px 0; color: var(--text-muted); text-transform: uppercase; font-size: 13px;" data-i18n="lblPassive">Expertise Passive</h4>
                    <div id="modal-passive-display" style="background: rgba(245, 184, 64, 0.05); border: 1px solid rgba(245, 184, 64, 0.3); padding: 15px; border-radius: 8px;">
                        </div>
                </div>

                <div class="skills-section">
                    <h4 style="margin: 0 0 15px 0; color: var(--text-muted); text-transform: uppercase; font-size: 13px;" data-i18n="lblActive">Compétences Actives</h4>
                    <div id="modal-skills-list" style="display: flex; flex-direction: column; gap: 15px;">
                        </div>
                </div>
                </div>

            </div>

            <div class="modal-actions" style="padding: 15px; text-align: right; border-top: 1px solid var(--border); background: var(--bg-color);">
                <button onclick="closeMasterModal()" class="btn-reset" style="background: transparent; border: 1px solid var(--text-muted); color: var(--text-muted); margin-right: 10px;" data-i18n="btnCancel">Annuler</button>
                <button onclick="saveMasterSettings()" class="btn-reset" style="background: var(--accent); color: #000; font-weight: bold;" data-i18n="btnSave">Enregistrer</button>
            </div>
        </div>
    </div>

    <script src="js/site-config.js"></script>
    <script src="js/storage-keys.js"></script>
    <script src="js/lang.js"></script>
    <script src="js/help.js"></script>
    <script src="js/header.js"></script>
    <script src="js/masters.js"></script>
    <script src="js/modal-tabs.js"></script>
    <script src="js/backup.js"></script>
</body>
</html>
