name: Discord News
on:
  schedule:
    - cron: '0 */2 * * *'   # toutes les 2 h (UTC) — déclenchement best-effort côté GitHub
  workflow_dispatch: {}       # bouton manuel

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Récupère le SHA du dernier commit déjà notifié (persisté entre les runs via le cache)
      - name: Restaurer le dernier commit notifié
        uses: actions/cache/restore@v4
        with:
          path: .last_notified_sha
          key: discord-last-sha-${{ github.run_id }}
          restore-keys: |
            discord-last-sha-

      - name: Collecter les commits depuis la dernière news
        id: c
        run: |
          SINCE=""
          [ -f .last_notified_sha ] && SINCE=$(cat .last_notified_sha)
          if [ -n "$SINCE" ] && git cat-file -e "${SINCE}^{commit}" 2>/dev/null; then
            LOG=$(git log "${SINCE}..HEAD" --no-merges --name-only --pretty=format:'@@@C@@@%s@@@F@@@%b@@@N@@@')
          else
            # 1er run (ou cache expiré) : on retombe sur la fenêtre 2 h pour ne pas tout renvoyer
            LOG=$(git log --since="2 hours ago" --no-merges --name-only --pretty=format:'@@@C@@@%s@@@F@@@%b@@@N@@@')
          fi
          if [ -z "$LOG" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            {
              echo "log<<LOG_EOF"
              echo "$LOG"
              echo "LOG_EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Traduire et envoyer sur Discord
        if: steps.c.outputs.has_changes == 'true'
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          SRC_LANG: ${{ vars.SRC_LANG }}
          COMMITS: ${{ steps.c.outputs.log }}
        run: node .github/scripts/news.js

      # N'avance le pointeur QUE si l'envoi n'a pas échoué (étape sautée si l'envoi plante -> retry au prochain run)
      - name: Avancer le pointeur au dernier commit
        run: git rev-parse HEAD > .last_notified_sha

      - name: Mémoriser le dernier commit notifié
        uses: actions/cache/save@v4
        with:
          path: .last_notified_sha
          key: discord-last-sha-${{ github.run_id }}
