<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrueGold War Academy — Kingshot Toolbox</title>
    <meta name="description" content="Plan your TrueGold War Academy troop research. Suggest the optimal path for Classic, KvK points, or a target score.">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/waracademy.css">
</head>
<body>

    <div class="sidebar">
        <h2 data-i18n="ctrlPanel">Control Panel</h2>

        <div class="control-group">
            <h3 data-i18n="config">Configuration</h3>
            <div class="control-row">
                <label data-i18n="waLevel">War Academy Level</label>
                <input type="number" id="waLevel" value="4" min="1" max="10" oninput="WA.triggerUpdate()" onchange="WA.triggerUpdate()">
            </div>
            <div class="control-row">
                <label data-i18n="speedBonus">Speed Bonus (%)</label>
                <input type="number" id="speedBonus" value="76.5" step="0.1" min="0" oninput="WA.triggerUpdate()" onchange="WA.triggerUpdate()">
            </div>
        </div>

        <div class="control-group">
            <h3 data-i18n="resources">Resources</h3>
            <div class="control-row">
                <label data-i18n="dustBudget">TrueGold Dust</label>
                <input type="number" id="dustBudget" value="0" min="0" oninput="WA.triggerUpdate()" onchange="WA.triggerUpdate()">
            </div>
        </div>

        <div class="control-group">
            <h3 data-i18n="kvkTitle">Mode &amp; Speedups</h3>
            <div class="control-row">
                <label style="color:var(--accent); font-weight:bold;" data-i18n="modeLabel">Mode</label>
                <select id="modeSelect" onchange="WA.onModeChange()">
                    <option value="classic" data-i18n="modeClassic">Max researches</option>
                    <option value="kvk" data-i18n="modeKvk">KvK (max points)</option>
                    <option value="target" data-i18n="modeTarget">Target score</option>
                </select>
            </div>
            <div class="control-row" id="targetRow" style="display:none;">
                <label data-i18n="targetScore">Target score</label>
                <input type="number" id="targetScore" value="2000000" min="0" step="1000" oninput="WA.triggerUpdate()" onchange="WA.triggerUpdate()">
            </div>
            <div class="control-row">
                <label data-i18n="days">Days</label>
                <input type="number" id="accDays" value="2" min="0" oninput="WA.triggerUpdate()" onchange="WA.triggerUpdate()">
            </div>
            <div class="control-row">
                <label data-i18n="hours">Hours</label>
                <input type="number" id="accHours" value="0" min="0" oninput="WA.triggerUpdate()" onchange="WA.triggerUpdate()">
            </div>
            <div class="control-row">
                <label data-i18n="minutes">Minutes</label>
                <input type="number" id="accMinutes" value="0" min="0" oninput="WA.triggerUpdate()" onchange="WA.triggerUpdate()">
            </div>
        </div>

        <div class="control-group">
            <h3 data-i18n="filters">Suggestion Filters</h3>
            <div class="control-row">
                <label class="tree-label"><span class="wa-dot" data-tree="infantry"></span> <span data-i18n="treeInfantry">Infantry</span></label>
                <input type="checkbox" id="filter-infantry" checked onchange="WA.triggerUpdate()">
            </div>
            <div class="control-row">
                <label class="tree-label"><span class="wa-dot" data-tree="archer"></span> <span data-i18n="treeArcher">Archer</span></label>
                <input type="checkbox" id="filter-archer" checked onchange="WA.triggerUpdate()">
            </div>
            <div class="control-row">
                <label class="tree-label"><span class="wa-dot" data-tree="cavalry"></span> <span data-i18n="treeCavalry">Cavalry</span></label>
                <input type="checkbox" id="filter-cavalry" checked onchange="WA.triggerUpdate()">
            </div>
        </div>
    </div>

    <div class="main-content flow">
        <div class="panel">
            <h2 data-i18n="researchTree">Research Tree</h2>
            <p class="wa-hint" data-i18n="treeHint">Tap a node's level to set your current progress.</p>
            <div class="tabs" id="wa-tabs"><!-- injected --></div>
            <div class="wa-tree-wrap">
                <div class="wa-tree" id="wa-tree">
                    <svg class="wa-connectors" id="wa-connectors" aria-hidden="true"></svg>
                    <!-- nodes injected --></div>
            </div>
            <div class="wa-legend">
                <span class="wa-legend-item"><span class="wa-swatch is-max"></span> <span data-i18n="legMax">Maxed</span></span>
                <span class="wa-legend-item"><span class="wa-swatch is-done"></span> <span data-i18n="legDone">In progress</span></span>
                <span class="wa-legend-item"><span class="wa-swatch is-available"></span> <span data-i18n="legAvail">Available</span></span>
                <span class="wa-legend-item"><span class="wa-swatch is-locked"></span> <span data-i18n="legLocked">Locked</span></span>
                <span class="wa-legend-item"><span class="wa-swatch is-suggested"></span> <span data-i18n="legSuggested">Suggested</span></span>
            </div>
        </div>

        <div class="panel">
            <h2 data-i18n="strategyOutput">Strategy Output</h2>
            <div id="wa-output" class="result-box"></div>
        </div>
    </div>

    <script src="js/site-config.js"></script>
    <script src="js/storage-keys.js"></script>
    <script src="js/lang.js"></script>
    <script src="js/help.js"></script>
    <script src="js/wa_optimizer.js"></script>
    <script src="js/waracademy.js"></script>
    <script src="js/header.js"></script>
</body>
</html>
