<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma Caserne - Hub-Kingshot</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="sidebar">
        <h2 style="color: var(--accent); margin-top: 0;">Ma Caserne</h2>
        <p style="color: var(--text-muted); font-size: 13px; line-height: 1.5;">
            Cliquez sur un héros pour configurer ses compétences, son niveau et ses étoiles.
        </p>

        <div class="control-group" style="margin-top: 20px;">
            <h3 style="margin: 0 0 15px 0; font-size: 14px; color: var(--text-muted); text-transform: uppercase;">Tri & Filtres</h3>
            
            <div class="control-row" style="margin-bottom: 10px;">
                <label>Trier par</label>
                <select id="sort-by" class="table-select" style="width: 120px;">
                    <option value="rarity-desc">Rareté (Décroissant)</option>
                    <option value="rarity-asc">Rareté (Croissant)</option>
                    <option value="gen-desc">Génération (Plus récente)</option>
                    <option value="gen-asc">Génération (Plus ancienne)</option>
                    <option value="name">Nom (A-Z)</option>
                </select>
            </div>

            <hr style="border: 0; border-top: 1px solid var(--border); margin: 15px 0;">

            <div class="control-row" style="margin-bottom: 10px;">
                <label>Génération</label>
                <select id="filter-gen" class="table-select" style="width: 120px;">
                    <option value="all" selected>Toutes</option>
                    <option value="1">Gen 1 uniquement</option>
                    <option value="2">Gen 2 uniquement</option>
                    <option value="3">Gen 3 uniquement</option>
                    <option value="4">Gen 4 uniquement</option>
                    <option value="5">Gen 5 uniquement</option>
                    <option value="6">Gen 6 uniquement</option>
                    <option value="7">Gen 7 uniquement</option>
                </select>
            </div>
            
            <div class="control-row" style="margin-bottom: 10px;">
                <label>Type</label>
                <select id="filter-type" class="table-select" style="width: 120px;">
                    <option value="all">Tous les types</option>
                    <option value="Infantry">Infanterie 🛡️</option>
                    <option value="Cavalry">Cavalerie 🐎</option>
                    <option value="Archer">Archers 🏹</option>
                </select>
            </div>

            <div class="control-row">
                <label>Rareté</label>
                <select id="filter-rarity" class="table-select" style="width: 120px;">
                    <option value="all">Toutes</option>
                    <option value="legendary">Légendaire 🟡</option>
                    <option value="epic">Épique 🟣</option>
                    <option value="rare">Rare 🔵</option>
                </select>
            </div>
        </div>
    </div>

    <main class="main-content flow" style="padding: 20px;">
        <div id="heroes-grid" class="heroes-grid"></div>
    </main>

    <div id="hero-modal" class="modal" style="display: none;">
        <div class="modal-content" style="max-width: 350px;">
            <h3 id="modal-hero-name" style="color: var(--accent); margin-top: 0;">Nom du Héros</h3>
            <p id="modal-hero-skill" style="font-size: 13px; color: var(--text-muted); margin-bottom: 20px; font-style: italic;"></p>
            
            <div class="control-row" style="margin-bottom: 20px;">
                <label>Compétence 1</label>
                <select id="modal-skill-level" class="table-select">
                    <option value="0">Non possédé (0)</option>
                    <option value="1">Niveau 1</option>
                    <option value="2">Niveau 2</option>
                    <option value="3">Niveau 3</option>
                    <option value="4">Niveau 4</option>
                    <option value="5">Niveau 5</option>
                </select>
            </div>
            
            <div class="modal-actions" style="text-align: right;">
                <button id="close-modal" class="btn-reset" style="background: transparent; border: 1px solid var(--text-muted); color: var(--text-muted);">Annuler</button>
                <button id="save-modal" class="btn-reset" style="background: var(--accent); color: #000;">Enregistrer</button>
            </div>
        </div>
    </div>

    <script src="js/header.js"></script>
    <script src="js/caserne.js"></script>
</body>
</html>
