<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ma Caserne - Hub-Kingshot</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <button class="theme-toggle" id="theme-toggle" onclick="toggleTheme()">☀️ Light Mode</button>
    
    <div class="sidebar">
        <h2 style="color: var(--accent); margin-top: 0;" data-i18n="pageTitle">Ma Caserne</h2>
        <p style="color: var(--text-muted); font-size: 13px; line-height: 1.5;" data-i18n="pageDesc">
            Cliquez sur un héros pour configurer ses compétences, son niveau et ses étoiles.
        </p>

        <div class="control-group" style="margin-top: 20px;">
            <h3 style="margin: 0 0 15px 0; font-size: 14px; color: var(--text-muted); text-transform: uppercase;" data-i18n="filterSort">Tri & Filtres</h3>
            
            <div class="control-row" style="margin-bottom: 10px;">
                <label data-i18n="sortBy">Trier par</label>
                <select id="sort-by" class="table-select" style="width: 100%;">
                    <option value="rarity-desc" data-i18n="sortRarityDesc">Rareté (Décroissant)</option>
                    <option value="rarity-asc" data-i18n="sortRarityAsc">Rareté (Croissant)</option>
                    <option value="gen-desc" data-i18n="sortGenDesc">Génération (Plus récente)</option>
                    <option value="gen-asc" data-i18n="sortGenAsc">Génération (Plus ancienne)</option>
                    <option value="name" data-i18n="sortName">Nom (A-Z)</option>
                </select>
            </div>

            <hr style="border: 0; border-top: 1px solid var(--border); margin: 15px 0;">

            <div class="control-row" style="margin-bottom: 15px; flex-direction: column; align-items: flex-start;">
                <label style="margin-bottom: 8px;" data-i18n="filterGen">Générations (Multi-choix)</label>
                <div id="filter-gen-group" style="display: flex; flex-wrap: wrap; gap: 10px;">
                    <label style="display: flex; align-items: center; gap: 4px; font-size: 13px; cursor: pointer;">
                        <input type="checkbox" value="1" class="gen-checkbox" checked> Génération 1
                    </label>
                    <label style="display: flex; align-items: center; gap: 4px; font-size: 13px; cursor: pointer;">
                        <input type="checkbox" value="2" class="gen-checkbox" checked> Génération 2
                    </label>
                    <label style="display: flex; align-items: center; gap: 4px; font-size: 13px; cursor: pointer;">
                        <input type="checkbox" value="3" class="gen-checkbox" checked> Génération 3
                    </label>
                    <label style="display: flex; align-items: center; gap: 4px; font-size: 13px; cursor: pointer;">
                        <input type="checkbox" value="4" class="gen-checkbox" checked> Génération 4
                    </label>
                    <label style="display: flex; align-items: center; gap: 4px; font-size: 13px; cursor: pointer;">
                        <input type="checkbox" value="5" class="gen-checkbox" checked> Génération 5
                    </label>
                    <label style="display: flex; align-items: center; gap: 4px; font-size: 13px; cursor: pointer;">
                        <input type="checkbox" value="6" class="gen-checkbox" checked> Génération 6
                    </label>
                    <label style="display: flex; align-items: center; gap: 4px; font-size: 13px; cursor: pointer;">
                        <input type="checkbox" value="7" class="gen-checkbox" checked> Génération 7
                    </label>
                </div>
            </div>

            <div class="control-row" style="margin-bottom: 10px;">
                <label data-i18n="filterType">Type</label>
                <select id="filter-type" class="table-select" style="width: 120px;">
                    <option value="all" data-i18n="typeAll">Tous les types</option>
                    <option value="Infantry" data-i18n="typeInf">Infanterie 🛡️</option>
                    <option value="Cavalry" data-i18n="typeCav">Cavalerie 🐎</option>
                    <option value="Archer" data-i18n="typeArc">Archers 🏹</option>
                </select>
            </div>

            <div class="control-row">
                <label data-i18n="filterRarity">Rareté</label>
                <select id="filter-rarity" class="table-select" style="width: 120px;">
                    <option value="all" data-i18n="rarityAll">Toutes</option>
                    <option value="legendary" data-i18n="rarityLeg">Légendaire 🟡</option>
                    <option value="epic" data-i18n="rarityEpi">Épique 🟣</option>
                    <option value="rare" data-i18n="rarityRar">Rare 🔵</option>
                </select>
            </div>
            <hr style="border: 0; border-top: 1px solid var(--border); margin: 15px 0;">

            <div class="control-row">
                <label style="display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 13px;">
                    <input type="checkbox" id="filter-unlocked-only" class="table-input">
                    <span data-i18n="filterUnlocked">Uniquement les débloqués</span>
                </label>
            </div>
        </div>
    </div>

    <main class="main-content flow" style="padding: 20px;">
        <div id="heroes-grid" class="heroes-grid"></div>
    </main>

    <div id="hero-modal" class="modal" style="display: none;">
        <div class="modal-content" style="max-width: 450px; padding: 0; overflow: hidden;">
            
            <div class="modal-header" style="padding: 20px; background: rgba(0,0,0,0.5); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;">
                <h2 id="modal-hero-name" style="margin: 0; color: var(--accent);">Nom</h2>
                
                <label class="switch-container">
                    <input type="checkbox" id="modal-unlocked">
                    <span class="switch-slider"></span>
                    <span style="font-size: 14px; font-weight: bold;" data-i18n="modalUnlocked">Débloqué</span>
                </label>
            </div>

            <div id="modal-body" style="padding: 20px;">
                
                <div class="progression-section" style="margin-bottom: 25px;">
                    <div class="control-row" style="justify-content: space-between; margin-bottom: 15px;">
                        <label style="font-weight: bold;" data-i18n="modalLvl">Niveau du Héros</label>
                        <input type="number" id="modal-level" min="1" max="80" value="1" class="table-input" style="width: 80px; text-align: center;">
                    </div>
                    
                    <div class="stars-section" style="background: var(--bg-color); padding: 15px; border-radius: 8px; border: 1px solid var(--border); text-align: center;">
                        <div id="modal-stars-display" style="font-size: 28px; letter-spacing: 5px; color: #f5b840; margin-bottom: 10px; text-shadow: 0 0 5px rgba(245, 184, 64, 0.5);">
                            </div>
                        <input type="range" id="modal-shards" min="0" max="30" value="0" style="width: 100%; cursor: pointer;">
                        <div style="font-size: 13px; color: var(--text-muted); margin-top: 5px;">
                            <span data-i18n="modalShards">Fragments d'étoiles :</span> <span id="modal-shards-count" style="color: var(--text-light); font-weight: bold;">0</span>/30
                    </div>
                </div>

                <div class="skills-section">
                    <h4 style="margin: 0 0 15px 0; color: var(--text-muted); text-transform: uppercase; font-size: 13px;" data-i18n="modalSkills">Compétences</h4>
                    <div id="modal-skills-list" style="display: flex; flex-direction: column; gap: 15px;">
                        </div>
                </div>

            </div>

            <div class="modal-actions" style="padding: 15px; text-align: right; border-top: 1px solid var(--border); background: var(--bg-color);">
                <button id="close-modal" class="btn-reset" style="background: transparent; border: 1px solid var(--text-muted); color: var(--text-muted); margin-right: 10px;" data-i18n="modalCancel">Annuler</button>
                <button id="save-modal" class="btn-reset" style="background: var(--accent); color: #000; font-weight: bold;" data-i18n="modalSave">Enregistrer</button>
            </div>
        </div>
    </div>

    <script src="js/lang.js"></script>
    <script src="js/caserne.js"></script>
    <script src="js/header.js"></script>
</body>
</html>
