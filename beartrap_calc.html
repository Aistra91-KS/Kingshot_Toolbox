<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bear Trap Optimizer - Hub-Kingshot</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Correction visuelle : on redonne l'apparence des nombres aux champs texte */
        input[type="text"].formatted-number {
            background: var(--input-bg);
            border: 1px solid var(--border);
            color: var(--text-light);
            padding: 6px;
            border-radius: 4px;
            width: 90px;
            text-align: right;
            outline: none;
            font-family: inherit;
            font-size: 14px;
            transition: border-color 0.2s;
        }
        input[type="text"].formatted-number:focus {
            border-color: var(--accent);
        }
        input[type="text"].formatted-number::placeholder {
            color: var(--text-muted);
            opacity: 0.7;
        }
        
    </style>
</head>
<body>
    <!-- SIDEBAR : Formulaire de saisie -->
    <aside class="sidebar">
        <h2 data-i18n="titleParams" style="color: var(--accent); margin-top: 0;">Paramètres</h2>
        
        <!-- NOUVEAU : Bloc Langue dédié -->
        <div class="control-group">
            <div class="control-row">
                <label data-i18n="lblLang">Langue</label>
                <select id="lang-select" class="table-select" style="width: 80px;">
                    <option value="FR">FR</option>
                    <option value="EN">EN</option>
                </select>
            </div>
        </div>
        
        <!-- Bloc 1 : Troupes (Ordre modifié : Inf > Cav > Arc) -->
        <div class="control-group">
            <h3 data-i18n="grpTroops" style="margin: 0 0 10px 0; font-size: 14px; color: var(--text-muted);">Mes Troupes (T10/T11...)</h3>
            <div class="control-row">
                <label data-i18n="lblInf">Infanterie 🛡️</label>
                <input type="text" id="troop-inf" class="formatted-number" value="0">
            </div>
            <div class="control-row">
                <label data-i18n="lblCav">Cavalerie 🐎</label>
                <input type="text" id="troop-cav" class="formatted-number" value="0">
            </div>
            <div class="control-row">
                <label data-i18n="lblArc">Archers 🏹</label>
                <input type="text" id="troop-arc" class="formatted-number" value="0">
            </div>
        </div>

        <!-- Bloc 2 : Capacité de marche -->
        <div class="control-group">
            <h3 data-i18n="grpCap" style="margin: 0 0 10px 0; font-size: 14px; color: var(--text-muted);">Ma Capacité</h3>
            <div class="control-row">
                <label data-i18n="lblBase">Capacité de base</label>
                <input type="text" id="cap-base" class="formatted-number" value="120 000">
            </div>
            <div class="control-row">
                <label data-i18n="lblExp">Bonus Expert</label>
                <input type="text" id="cap-expert" class="formatted-number" value="0">
            </div>
            <div class="control-row">
                <label data-i18n="lblAni">Bonus Animal</label>
                <input type="text" id="cap-animal" class="formatted-number" value="0">
            </div>
            <div class="control-row">
                <label data-i18n="lblMaxM">Nb de marches max</label>
                <input type="text" id="marches-count" class="formatted-number" value="5">
            </div>
        </div>

        <!-- Bloc 3 : Statut et Limites -->
        <div class="control-group">
            <h3 data-i18n="grpOrg" style="margin: 0 0 10px 0; font-size: 14px; color: var(--text-muted);">Organisation</h3>
            <div class="control-row">
                <label data-i18n="lblRole">Rôle</label>
                <select id="player-role" class="table-select" style="width: 120px;">
                    <option value="participant">Participant</option>
                    <option value="organizer">Organisateur</option>
                </select>
            </div>
            <div class="control-row">
                <!-- NOUVEAU : Ajout du placeholder dynamique -->
                <label data-i18n="lblLimit" title="Limite imposée par l'alliance">Plafond d'envoi</label>
                <input type="text" id="alliance-limit" class="formatted-number" data-i18n-placeholder="plcLimit" placeholder="Illimité">
            </div>
        </div>

        <!-- Bloc 4 : Optimisation -->
        <div class="control-group">
            <h3 data-i18n="grpOpt" style="margin: 0 0 10px 0; font-size: 14px; color: var(--text-muted);">Mode d'optimisation</h3>
            <div class="control-row">
                <label data-i18n="lblMode">Mode</label>
                <select id="optim-mode" class="table-select" style="width: 120px;">
                    <option value="threshold">Seuils Mini</option>
                    <option value="formula">Formule (Bientôt)</option>
                </select>
            </div>
            <div id="threshold-inputs">
                <div class="control-row" style="margin-top: 10px;">
                    <label data-i18n="lblMinInf">Infanterie min (%)</label>
                    <input type="text" id="min-inf-percent" class="formatted-number" value="10">
                </div>
                <div class="control-row" style="margin-top: 10px;">
                    <label data-i18n="lblMinCav">Cavalerie min (%)</label>
                    <input type="text" id="min-cav-percent" class="formatted-number" value="10">
                </div>
            </div>
        </div>

        <button id="btn-calculate" class="btn-reset" data-i18n="btnCalc" style="width: 100%; margin-top: 10px; padding: 12px; font-size: 14px;">
            Calculer les marches
        </button>
    </aside>

    <!-- MAIN CONTENT : Affichage des résultats -->
    <main class="main-content flow">
        <div class="panel">
            <h2 data-i18n="planTitle" style="color: var(--accent); margin-top: 0;">Plan de déploiement</h2>
            <p data-i18n="planDesc" style="color: var(--text-muted); font-size: 14px;">
                Remplissez vos paramètres à gauche et cliquez sur Calculer pour générer vos formations de marches optimales.
            </p>
            
            <div id="result-area" class="table-container" style="margin-top: 20px; display: none;"></div>
        </div>
    </main>

    <!-- Scripts partagés -->
    <script src="js/lang.js"></script>
    <script src="js/header.js"></script>
    <script src="js/beartrap.js"></script>
</body>
</html>
